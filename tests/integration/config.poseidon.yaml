# MythicMCP Integration Test Configuration — Poseidon Only
# Copy to config.yaml and fill in your environment details:
#   cp config.poseidon.yaml config.yaml
#
# This tests Poseidon (macOS/Linux Golang agent) in isolation on a Linux target.

mythic:
  server_url: "https://MYTHIC_IP:7443"
  api_token: "eyJ..."
  # username: "mythic_admin"
  # password: "your_password_here"
  timeout: 30

timeouts:
  payload_generation: 300
  callback_verification: 120
  command_execution: 60
  polling_interval: 5

agents:
  - name: "poseidon"
    payload_type: "poseidon"
    os: "Linux"
    filename: "poseidon_test"
    c2_profiles:
      - c2_profile: "http"
        c2_profile_parameters:
          callback_host: "https://MYTHIC_IP"
          callback_port: 443
    build_parameters: []
    description: "Poseidon test payload for Linux targets"

targets:
  - name: "linux-target"
    hostname: "debian-vm"
    os: "Linux"
    callback_id: 1
    upload_path: "/tmp/test_payload"
    agents:
      - "poseidon"

# Prerequisites:
#   - The test runner auto-uploads tests/integration/fixtures/test_upload.txt
#     and substitutes REPLACE_WITH_FILE_ID at runtime. No manual step needed.
test_commands:
  poseidon:
    # =======================================================================
    # Shell & Command Execution
    # =======================================================================
    - command: "shell"
      parameters:
        command: "id"
      expected_output: "uid="
      timeout: 60
    - command: "run"
      parameters:
        path: "/usr/bin/uname"
        args: '["-a"]'
      expected_output: "Linux"
      timeout: 60

    # =======================================================================
    # File Operations — sequenced: pwd → ls → mkdir → upload → cat → chmod → cp → mv → download → rm
    # =======================================================================
    - command: "pwd"
      parameters: {}
      expected_output: "/"
      timeout: 60
    - command: "ls"
      parameters:
        path: "/tmp"
      expected_output: ""
      timeout: 60
    - command: "mkdir"
      parameters:
        path: "/tmp/mcp_test"
      expected_output: ""
      timeout: 30
    - command: "upload"
      parameters:
        file_id: "REPLACE_WITH_FILE_ID"
        remote_path: "/tmp/mcp_test/test.txt"
      expected_output: ""
      timeout: 120
    - command: "cat"
      parameters:
        path: "/tmp/mcp_test/test.txt"
      expected_output: "MythicMCP-test-fixture"
      timeout: 60
    - command: "chmod"
      parameters:
        path: "/tmp/mcp_test/test.txt"
        mode: "644"
      expected_output: ""
      timeout: 30
    - command: "cp"
      parameters:
        source: "/tmp/mcp_test/test.txt"
        destination: "/tmp/mcp_test/test_copy.txt"
      expected_output: ""
      timeout: 60
    - command: "mv"
      parameters:
        source: "/tmp/mcp_test/test_copy.txt"
        destination: "/tmp/mcp_test/test_moved.txt"
      expected_output: ""
      timeout: 60
    - command: "download"
      parameters:
        path: "/tmp/mcp_test/test.txt"
      expected_output: ""
      timeout: 120
    - command: "rm"
      parameters:
        path: "/tmp/mcp_test/test_moved.txt"
      expected_output: ""
      timeout: 30
    - command: "rm"
      parameters:
        path: "/tmp/mcp_test/test.txt"
      expected_output: ""
      timeout: 30

    # =======================================================================
    # Process & Jobs
    # =======================================================================
    - command: "ps"
      parameters: {}
      expected_output: ""
      timeout: 60

    # =======================================================================
    # Environment & System Info
    # =======================================================================
    - command: "getenv"
      parameters: {}
      expected_output: "PATH"
      timeout: 30
    - command: "ifconfig"
      parameters: {}
      expected_output: ""
      timeout: 30
    - command: "config"
      parameters: {}
      expected_output: ""
      timeout: 30
    - command: "drives"
      parameters: {}
      expected_output: ""
      timeout: 30
    - command: "keys"
      parameters:
        command: "dumpsession"
      expected_output: ""
      timeout: 30

    # =======================================================================
    # Configuration & Control
    # =======================================================================
    - command: "print_c2"
      parameters: {}
      expected_output: ""
      timeout: 30
    - command: "shell_config"
      parameters:
        shell: "/bin/bash"
      expected_output: ""
      timeout: 30
