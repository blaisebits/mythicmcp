  # Shell Configuration (2)
  # =========================================================================

  - name: shell_config
    description: "Configure shell command behavior on a Poseidon callback"
    mythic_command: shell_config
    timeout: 60
    parameters:
      - name: shell
        type: string
        description: "Path to shell binary"
        default: "/bin/bash"

  - name: chmod
    description: "Change file permissions on a Poseidon callback"
    mythic_command: chmod
    timeout: 60
    parameters:
      - name: path
